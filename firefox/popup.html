<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch-A-Phish</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 330px;
            height: 350px;
            font-family: 'Inter', sans-serif;
            background: url('background.png') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            /* border-radius: 20px; */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(7px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 2rem;
            text-align: center;
            width: 300px;
            height: 310px;
            color: white;
        }

        .logo {
            width: 96px;
            /* Increased from 64px */
            height: 96px;
            /* Increased from 64px */
            border-radius: 50%;
            background-color: rgba(0, 0, 0, 0.15);
            padding: 2px;
            margin: 0 auto 1rem;
        }

        .status {
            font-size: 2rem;
            font-weight: 700;
            margin: 1rem 0;
        }

        .status.legitimate {
            color: #b4ffbe;
        }

        .status.phishing {
            color: #ff8a8a;
        }

        .url-box {
            background-color: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            word-wrap: break-word;
            /* Fixed dimensions to keep the box always the same size */
            height: 30px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;

            /* Firefox scrollbar styling */
            scrollbar-width: thin;
            scrollbar-color: #8136f9 transparent;
            /* thumb, track */
        }

        /* Webkit (Chrome, Safari, Edge) */
        .url-box::-webkit-scrollbar {
            height: 6px;
            /* Adjust scrollbar height if needed */
        }

        .url-box::-webkit-scrollbar-track {
            background: transparent;
        }

        .url-box::-webkit-scrollbar-thumb {
            background-color: #888;
            border-radius: 3px;
        }


        .heading {
            font-size: 1.8rem;
            /* Increased for more prominence */
            font-weight: 700;
            /* Makes the heading bolder */
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="heading">Catch-A-Phish</div>
        <img src="logo.png" alt="Phish Logo" class="logo" />
        <p id="result" class="status legitimate">Checking Status</p>
        <p class="url-box" id="url">Analysing Page</p>
    </div>
    <script src="popup.js"></script>

</body>

</html>
