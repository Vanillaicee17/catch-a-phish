name: DevSecOps

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sca:
    name: Security - SCA
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        working-directory: backend
        continue-on-error: true

      - name: Run cargo-audit
        continue-on-error: true
        run: |
          mkdir -p security-reports/sca
          set +e
          cd backend
          cargo audit --json > ../security-reports/sca/cargo-audit.json
          cd ..
          if [ ! -s security-reports/sca/cargo-audit.json ]; then
            echo '{"error":"cargo-audit did not produce a report."}' > security-reports/sca/cargo-audit.json
          fi

      - name: Upload SCA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-sca
          path: security-reports/sca/

  sast:
    name: Security - SAST
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade pip semgrep
        continue-on-error: true

      - name: Run Semgrep
        continue-on-error: true
        run: |
          mkdir -p security-reports/sast
          set +e
          semgrep scan --config auto --json --output security-reports/sast/semgrep.json .
          semgrep scan --config auto --sarif --output security-reports/sast/semgrep.sarif .
          if [ ! -s security-reports/sast/semgrep.json ]; then
            echo '{"results":[],"errors":["Semgrep did not produce JSON output."]}' > security-reports/sast/semgrep.json
          fi
          if [ ! -s security-reports/sast/semgrep.sarif ]; then
            echo '{
              "version": "2.1.0",
              "runs": [{
                "tool": {
                  "driver": {
                    "name": "semgrep",
                    "informationUri": "https://semgrep.dev",
                    "rules": []
                  }
                },
                "results": []
              }]
            }' > security-reports/sast/semgrep.sarif
          fi

      - name: Upload SAST artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-sast
          path: security-reports/sast/

      - name: Upload SAST SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security-reports/sast/semgrep.sarif
          category: semgrep

  container-scan:
    name: Security - Container Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t catch-a-phish-backend:security-scan backend

      - name: Run Trivy JSON scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: catch-a-phish-backend:security-scan
          format: json
          output: security-reports/container/trivy-image.json
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN

      - name: Run Trivy SARIF scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: catch-a-phish-backend:security-scan
          format: sarif
          output: security-reports/container/trivy-image.sarif
          exit-code: "0"
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN

      - name: Ensure container scan outputs exist
        if: always()
        run: |
          mkdir -p security-reports/container
          if [ ! -s security-reports/container/trivy-image.sarif ]; then
            echo '{
              "version": "2.1.0",
              "runs": [{
                "tool": {
                  "driver": {
                    "name": "trivy",
                    "informationUri": "https://github.com/aquasecurity/trivy",
                    "rules": []
                  }
                },
                "results": []
              }]
            }' > security-reports/container/trivy-image.sarif
          fi
      - name: Upload container scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-container
          path: security-reports/container/

      - name: Upload container scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security-reports/container/trivy-image.sarif
          category: trivy-image

  secret-detection:
    name: Security - Secret Detection
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks JSON scan
        continue-on-error: true
        run: |
          mkdir -p security-reports/secrets
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            git /repo --report-path /repo/security-reports/secrets/gitleaks.json --report-format json --no-banner

      - name: Run Gitleaks SARIF scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/repo" \
            ghcr.io/gitleaks/gitleaks:latest \
            git /repo --report-path /repo/security-reports/secrets/gitleaks.sarif --report-format sarif --no-banner

      - name: Ensure secret scan outputs exist
        if: always()
        run: |
          mkdir -p security-reports/secrets
          if [ ! -s security-reports/secrets/gitleaks.sarif ]; then
            echo '{
              "version": "2.1.0",
              "runs": [{
                "tool": {
                  "driver": {
                    "name": "gitleaks",
                    "informationUri": "https://github.com/gitleaks/gitleaks",
                    "rules": []
                  }
                },
                "results": []
              }]
            }' > security-reports/secrets/gitleaks.sarif
          fi

      - name: Upload secret scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-secrets
          path: security-reports/secrets/

      - name: Upload secret scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: security-reports/secrets/gitleaks.sarif
          category: gitleaks

  dast:
    name: Security - DAST
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - name: Start backend locally
        continue-on-error: true
        run: |
          mkdir -p security-reports/dast
          cd backend
          cargo run --release > ../security-reports/dast/backend.log 2>&1 &
          echo $! > ../security-reports/dast/backend.pid
          cd ..
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Run ZAP API scan
        continue-on-error: true
        run: |
          mkdir -p security-reports/dast
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE:/zap/wrk" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-api-scan.py \
            -t /zap/wrk/security/openapi/backend-api.yaml \
            -f openapi \
            -I \
            -J /zap/wrk/security-reports/dast/zap-api.json \
            -r /zap/wrk/security-reports/dast/zap-api.html \
            -w /zap/wrk/security-reports/dast/zap-api.md

      - name: Stop backend
        if: always()
        run: |
          if [ -f security-reports/dast/backend.pid ]; then
            kill "$(cat security-reports/dast/backend.pid)" || true
          fi

      - name: Ensure DAST outputs exist
        if: always()
        run: |
          mkdir -p security-reports/dast
          if [ ! -s security-reports/dast/zap-api.json ]; then
            echo '{"site":[]}' > security-reports/dast/zap-api.json
          fi
          if [ ! -s security-reports/dast/zap-api.md ]; then
            echo '# ZAP API Scan' > security-reports/dast/zap-api.md
          fi
          if [ ! -s security-reports/dast/zap-api.html ]; then
            echo '<html><body><h1>ZAP API Scan</h1><p>No HTML report was produced.</p></body></html>' > security-reports/dast/zap-api.html
          fi

      - name: Upload DAST artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-dast
          path: security-reports/dast/

  branch-protection-audit:
    name: Security - Branch Protection Audit
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit branch protection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          mkdir -p security-reports/branch-protection
          python scripts/audit_branch_protection.py \
            --repository "${{ github.repository }}" \
            --branch "${DEFAULT_BRANCH:-main}" \
            --output security-reports/branch-protection/branch-protection.json

      - name: Upload branch protection artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-branch-protection
          path: security-reports/branch-protection/

  consolidate:
    name: Security - Consolidated Report
    runs-on: ubuntu-latest
    needs:
      - sca
      - sast
      - container-scan
      - secret-detection
      - dast
      - branch-protection-audit
    if: always()

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-artifacts

      - name: Build consolidated report
        run: |
          mkdir -p security-reports/consolidated
          python scripts/consolidate_security_report.py \
            --artifacts-dir security-artifacts \
            --output security-reports/consolidated/devsecops-report.md

      - name: Publish workflow summary
        run: cat security-reports/consolidated/devsecops-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload consolidated report artifact
        uses: actions/upload-artifact@v4
        with:
          name: security-consolidated-report
          path: security-reports/consolidated/
